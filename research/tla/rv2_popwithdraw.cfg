\* rv2 scenario, normative withdraw-at-pop (Finding 5 repair): two sends
\* against a single receive with no other receiver. The receiver's token is
\* withdrawn in the same mutex section as its pop, so the second send parks
\* and is raised out by the close — nothing strands.
SPECIFICATION Spec
CONSTANTS
  Cap = 0
  SweepPolicy = "flip_all"
  FailCopy = FALSE
  Scenario = "rv2"
  EofPolicy = "wait_reserved"
  RecvFail = FALSE
  RvRing = "ring"
  RvPopWithdraw = "at_pop"
  RvAbandon = "none"
INVARIANTS
  TypeOK
  RcAccounting
  DestroyedClean
  EnvelopeAccounting
  ReservedAccounting
  RvTokenAccounting
  ParkedImpliesHeld
  CycleLeakOnly
  NoAbandonedTask
PROPERTIES
  Termination
