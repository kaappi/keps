\* rv2 scenario, REJECTED variant — Finding 5. Withdrawing the receiver's
\* token only at envelope deinit leaves it counted through the unlocked
\* copy-out: after the pop decrements queue_len and rings send_waiters, the
\* second send is admitted against the already-satisfied receiver, pushes,
\* and reports success; the receiver then withdraws, no receiver remains,
\* and the handoff is destroyed unreceived at teardown. EXPECTED TO FAIL on
\* NoAbandonedTask. This is the regression witness for the normative rule
\* that a token-holding pop withdraws demand atomically with the pop.
