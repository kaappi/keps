\* rv scenario, REJECTED variant — Finding 4. Demand that grows without
\* ringing send_waiters loses the sender wakeup: both senders can park
\* (admission bound 0 — no receiver committed yet) before either receiver
\* registers; the registrations grow rvDemand silently, every fiber is
\* parked, and nothing ever rings. EXPECTED TO FAIL on Termination (TLC
\* reports the all-parked deadlock). This is the regression witness for the
\* normative rule that a demand-growing registration snapshot-and-rings
\* send_waiters exactly like a freed slot.
