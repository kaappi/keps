\* rva scenario, normative atomic timeout-withdraw (Finding 6 repair): one
\* send against a single receiver that may abandon its wait once (the §6
\* timeout). The abandon's enabling condition — queue empty AND reserved = 0,
\* checked in the same mutex section as the withdrawal — structurally encodes
\* delivery-wins and the reservation-drain rule, so an admitted send always
\* lands with a receiver still committed (or is never admitted at all).
SPECIFICATION Spec
CONSTANTS
  Cap = 0
  SweepPolicy = "flip_all"
  FailCopy = FALSE
  Scenario = "rva"
  EofPolicy = "wait_reserved"
  RecvFail = FALSE
  RvRing = "ring"
  RvPopWithdraw = "at_pop"
  RvAbandon = "atomic"
INVARIANTS
  TypeOK
  RcAccounting
  DestroyedClean
  EnvelopeAccounting
  ReservedAccounting
  RvTokenAccounting
  ParkedImpliesHeld
  CycleLeakOnly
  NoAbandonedTask
PROPERTIES
  Termination
