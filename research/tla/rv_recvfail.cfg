\* rv scenario, receive-side copy failure: the raise is a terminal exit that
\* releases the receiver's demand token while the re-queued envelope stays
\* deliverable — the retry re-acquires a token (or pops directly), and no
\* committed handoff is abandoned (NoAbandonedTask) nor any wakeup lost
\* (Termination).
SPECIFICATION Spec
CONSTANTS
  Cap = 0
  SweepPolicy = "flip_all"
  FailCopy = FALSE
  Scenario = "rv"
  EofPolicy = "wait_reserved"
  RecvFail = TRUE
  RvRing = "ring"
INVARIANTS
  TypeOK
  RcAccounting
  DestroyedClean
  EnvelopeAccounting
  ReservedAccounting
  RvTokenAccounting
  ParkedImpliesHeld
  CycleLeakOnly
  NoAbandonedTask
PROPERTIES
  Termination
