\* strand scenario with the Finding-2 repair: EOF additionally waits for
\* reserved = 0 (and the failure path rings receivers when closed).
\* Expected to PASS, including NoAbandonedTask: an admitted task is always
\* drained by an until-EOF worker before anyone takes EOF.
SPECIFICATION Spec
CONSTANTS
  Cap = 4
  SweepPolicy = "flip_all"
  FailCopy = FALSE
  Scenario = "strand"
  EofPolicy = "wait_reserved"
  RecvFail = FALSE
  RvRing = "ring"
  RvPopWithdraw = "at_pop"
  RvAbandon = "none"
INVARIANTS
  TypeOK
  RcAccounting
  DestroyedClean
  EnvelopeAccounting
  ReservedAccounting
  ParkedImpliesHeld
  CycleLeakOnly
  NoAbandonedTask
PROPERTIES
  Termination
