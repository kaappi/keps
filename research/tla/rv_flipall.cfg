\* rv scenario: rendezvous channel (Cap = 0, kaappi#1601) under the normative
\* protocol — demand-bounded admission, token-carrying local-park migration,
\* demand-growth send_waiters ring, send-side copy failure reachable.
\* Sends = receive budgets, so NoAbandonedTask must hold: every committed
\* handoff is collected before destroy.
SPECIFICATION Spec
CONSTANTS
  Cap = 0
  SweepPolicy = "flip_all"
  FailCopy = TRUE
  Scenario = "rv"
  EofPolicy = "wait_reserved"
  RecvFail = FALSE
  RvRing = "ring"
INVARIANTS
  TypeOK
  RcAccounting
  DestroyedClean
  EnvelopeAccounting
  ReservedAccounting
  RvTokenAccounting
  ParkedImpliesHeld
  CycleLeakOnly
  NoAbandonedTask
PROPERTIES
  Termination
