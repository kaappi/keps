\* core scenario, effectively-unbounded channel (capacity >= total sends),
\* flip_all sweep. Safety only (liveness covered by the cap1 config).
SPECIFICATION Spec
CONSTANTS
  Cap = 4
  SweepPolicy = "flip_all"
  FailCopy = TRUE
  Scenario = "core"
  EofPolicy = "asis"
  RecvFail = FALSE
  RvRing = "ring"
INVARIANTS
  TypeOK
  RcAccounting
  DestroyedClean
  EnvelopeAccounting
  ReservedAccounting
  ParkedImpliesHeld
  CycleLeakOnly
